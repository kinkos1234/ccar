services:
  db:
    image: postgres:16-alpine
    container_name: ccar-db
    environment:
      POSTGRES_USER: ccar
      POSTGRES_PASSWORD: ccar
      POSTGRES_DB: ccar
    ports:
      - "5432:5432"
    volumes:
      - ccar-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccar"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ccar-pgdata:
